<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oria — Nouveau mot de passe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --violet:#6C5CE7; --violet-deep:#5642E0; --violet-light:#EFECFF;
    --red:#E75C5C; --ink:#161623; --gray:#6B6B7B; --gray-light:#F4F4F9; --border:#EAEAF3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--gray-light); color:var(--ink); font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  h1,h2{font-family:'Poppins', sans-serif; margin:0;}
  .logo{
    font-family:'Poppins', sans-serif; font-weight:700; font-size:1.4rem; color:var(--ink);
    text-decoration:none; display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:28px;
  }
  .logo .dot{width:10px; height:10px; border-radius:50%; background:var(--violet); display:inline-block;}
  .card{
    background:#fff; border-radius:24px; padding:36px 30px; max-width:400px; width:100%;
    box-shadow:0 20px 50px -20px rgba(20,20,40,0.15);
  }
  .card h2{font-size:1.3rem; margin-bottom:6px;}
  .sub{color:var(--gray); font-size:0.88rem; margin-bottom:22px;}
  label{display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px; margin-top:16px;}
  input{
    width:100%; padding:13px 14px; border-radius:12px; border:1.5px solid var(--border);
    font-size:0.95rem; font-family:'Inter',sans-serif; outline:none; transition:border 0.2s;
  }
  input:focus{border-color:var(--violet);}
  .btn{
    width:100%; margin-top:22px; background:var(--violet); color:#fff; border:none; padding:14px;
    border-radius:100px; font-weight:600; font-size:0.98rem; cursor:pointer; transition:background 0.2s;
    font-family:'Inter',sans-serif;
  }
  .btn:hover{background:var(--violet-deep);}
  .btn:disabled{opacity:0.6; cursor:not-allowed;}
  .msg{margin-top:16px; padding:12px 14px; border-radius:12px; font-size:0.87rem; display:none;}
  .msg.error{background:#FDEAEA; color:var(--red); display:block;}
  .msg.success{background:#E6FBF4; color:#0A9E76; display:block;}
</style>
</head>
<body>

<div style="width:100%; max-width:400px;">
  <a class="logo" href="index.html"><span class="dot"></span>Oria</a>
  <div class="card">
    <h2>Nouveau mot de passe</h2>
    <p class="sub">Choisissez un mot de passe pour votre compte.</p>
    <form id="form-reset">
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-password" required minlength="6" autocomplete="new-password">
      <button type="submit" class="btn" id="reset-btn">Mettre à jour</button>
    </form>
    <div class="msg" id="reset-msg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://plfydshfonnvntdvjikr.supabase.co";
  const SUPABASE_KEY = "sb_publishable_BUo7t_ZKSeGERdhvBX8yZw_90TOb_VP";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showMsg(el, text, type){
    el.textContent = text;
    el.className = "msg " + type;
  }

  document.getElementById("form-reset").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("reset-btn");
    const msg = document.getElementById("reset-msg");
    btn.disabled = true; btn.textContent = "Mise à jour...";
    const newPassword = document.getElementById("new-password").value;

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    btn.disabled = false; btn.textContent = "Mettre à jour";
    if(error){
      showMsg(msg, "Erreur : " + error.message, "error");
    } else {
      showMsg(msg, "Mot de passe mis à jour ! Vous pouvez vous connecter.", "success");
      setTimeout(() => { window.location.href = "auth.html"; }, 1500);
    }
  });
</script>

</body>
</html>
