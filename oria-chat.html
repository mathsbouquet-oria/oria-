<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oria — Votre assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --violet:#6C5CE7; --violet-deep:#5642E0; --violet-light:#EFECFF;
    --ink:#161623; --gray:#6B6B7B; --gray-light:#F4F4F9; --white:#FFFFFF; --border:#EAEAF3;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{
    background:var(--gray-light); color:var(--ink); font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; background:#fff; border-bottom:1px solid var(--border);
  }
  .logo{
    font-family:'Poppins', sans-serif; font-weight:700; font-size:1.15rem; color:var(--ink);
    text-decoration:none; display:flex; align-items:center; gap:8px;
  }
  .logo .dot{width:9px; height:9px; border-radius:50%; background:var(--violet); display:inline-block;}
  .logout{
    background:none; border:none; color:var(--gray); font-size:0.85rem; cursor:pointer;
    font-family:'Inter',sans-serif; text-decoration:underline;
  }

  #chat-container{
    flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:14px;
    max-width:640px; width:100%; margin:0 auto;
  }
  .msg{max-width:85%; padding:12px 16px; border-radius:18px; font-size:0.95rem; line-height:1.5; white-space:pre-wrap;}
  .msg.user{align-self:flex-end; background:var(--violet); color:#fff; border-bottom-right-radius:4px;}
  .msg.assistant{align-self:flex-start; background:#fff; border:1px solid var(--border); border-bottom-left-radius:4px;}
  .msg.typing{align-self:flex-start; background:#fff; border:1px solid var(--border); color:var(--gray); font-style:italic;}

  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--gray); padding:20px; max-width:640px; margin:0 auto;
  }
  .empty-state h2{font-family:'Poppins',sans-serif; color:var(--ink); font-size:1.2rem; margin-bottom:8px;}

  #input-bar{
    display:flex; gap:10px; padding:14px 16px; background:#fff; border-top:1px solid var(--border);
    max-width:640px; width:100%; margin:0 auto; box-sizing:border-box;
  }
  #message-input{
    flex:1; border:1.5px solid var(--border); border-radius:100px; padding:12px 18px;
    font-size:0.95rem; font-family:'Inter',sans-serif; outline:none; resize:none;
  }
  #message-input:focus{border-color:var(--violet);}
  #send-btn{
    background:var(--violet); color:#fff; border:none; width:44px; height:44px; border-radius:50%;
    cursor:pointer; font-size:1.2rem; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  #send-btn:disabled{opacity:0.5; cursor:not-allowed;}

  #auth-check{
    flex:1; display:flex; align-items:center; justify-content:center; color:var(--gray);
  }
</style>
</head>
<body>

<div id="auth-check">Vérification de votre session...</div>

<div id="app" style="display:none; flex-direction:column; height:100%;">
  <header>
    <a class="logo" href="index.html"><span class="dot"></span>Oria</a>
    <button class="logout" id="logout-btn">Se déconnecter</button>
  </header>

  <div id="chat-container">
    <div class="empty-state" id="empty-state">
      <h2>Bonjour 👋</h2>
      <p>Je suis Oria, votre assistant personnel. Posez-moi une question ou dites-moi ce dont vous avez besoin.</p>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="message-input" placeholder="Écrivez à Oria..." rows="1"></textarea>
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://plfydshfonnvntdvjikr.supabase.co";
  const SUPABASE_KEY = "sb_publishable_BUo7t_ZKSeGERdhvBX8yZw_90TOb_VP";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let conversationHistory = [];

  async function checkAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = "auth.html";
      return;
    }
    document.getElementById("auth-check").style.display = "none";
    document.getElementById("app").style.display = "flex";
  }
  checkAuth();

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "auth.html";
  });

  const chatContainer = document.getElementById("chat-container");
  const emptyState = document.getElementById("empty-state");
  const input = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  function addMessageToUI(role, text) {
    if (emptyState) emptyState.remove();
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;

    addMessageToUI("user", text);
    conversationHistory.push({ role: "user", content: text });

    const typingEl = document.createElement("div");
    typingEl.className = "msg typing";
    typingEl.textContent = "Oria écrit...";
    chatContainer.appendChild(typingEl);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      typingEl.remove();

      if (!response.ok) {
        addMessageToUI("assistant", "Désolée, une erreur est survenue : " + (data.error || "erreur inconnue"));
        sendBtn.disabled = false;
        return;
      }

      addMessageToUI("assistant", data.reply);
      conversationHistory.push({ role: "assistant", content: data.reply });

    } catch (err) {
      typingEl.remove();
      addMessageToUI("assistant", "Désolée, impossible de contacter le serveur. Vérifiez votre connexion.");
    }

    sendBtn.disabled = false;
  }
</script>

</body>
</html>
